<!DOCTYPE html>
<html>
<head>
<title>Hostel Flexbox Advanced</title>

<style>

.container {
  display: flex;
  flex-direction:row-reverse;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap-reverse;
  align-items: first baseline;
  height: 500px;
  width: 400px;
  background-color: lightblue;
  padding: 10px;
}
.room1{
  flex-grow: 5;
}

.room {
  flex-basis: 80px;   /* Initial height */
  flex-grow: 1;       /* Grow vertically */
  flex-shrink: 1;     
  width: 150px;
  background-color: navy;
  color: white;
  margin: 10px;
  text-align: center;
  line-height: 80px;
  border-radius: 10px;
}

/* VIP room grows more */
.vip {
  flex-grow: 3;
  background-color: darkred;
}

/* Temporary room shrinks more */
.temp {
  flex-shrink: 3;
}

</style>
</head>
<body>

<h2 style="text-align:center;">SSGMCE</h2>

<div class="container">
  <div class="room">CSE</div>
  <div class="room vip">AIML</div>
  <div class="room">IT</div>
  <div class="room temp">ENTC</div>
  <div class="room">Electrical</div>
</div>

<div class="container">
  <div class="box1"></div>
  <div class="box2"></div>
  <div class="box3"></div>
  <div class="box4"></div>
  <div class="box5"></div>
  <div class="box6"></div>
  <div class="box7"></div>
  <div class="box8"></div>
</div>


<div class="container">
  <div class="room">
    <div class="box">Box1</div>
    <div class="box">Box2</div>
    </div>
</div>

</body>
</html>
